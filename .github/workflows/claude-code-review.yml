name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  # Mirror of claude.yml's config job: pulls allowed_bots from
  # .github/project-config.yml so the action can authorise bot-authored PRs
  # (e.g. PRs opened by /devflow:implement under the claude GitHub App).
  # Without this the action rejects all bot actors and the check fails on
  # every Claude-authored PR.
  config:
    runs-on: ubuntu-latest
    outputs:
      allowed_bots: ${{ steps.extract.outputs.allowed_bots }}
    steps:
      - uses: actions/checkout@v6
      - id: cfg
        uses: ./.github/actions/read-project-config
      - id: extract
        env:
          CONFIG_JSON: ${{ steps.cfg.outputs.json }}
        run: |
          set -euo pipefail
          echo "allowed_bots=$(echo "$CONFIG_JSON" | jq -r '.claude.allowed_bots')" >> "$GITHUB_OUTPUT"

  claude-review:
    needs: config
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      # write needed so the code-review plugin can post inline review
      # comments back on the PR via the buffered-inline-comments step.
      # With read-only, Claude's create_inline_comment calls are rejected
      # and the post-step reports "No buffered inline comments".
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: ${{ needs.config.outputs.allowed_bots }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options